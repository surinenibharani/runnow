  <path d="M120 150 L95 190" stroke="#ea580c" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="108" cy="196" rx="22" ry="8" fill="#fb923c" fill-opacity="0.4" stroke="#ea580c" stroke-width="2"/>
