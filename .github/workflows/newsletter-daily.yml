name: Send newsletter emails

on:
  schedule:
    # Daily at 12:00 UTC (~7–8am US Eastern) — after 7am ET blog publishes
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger newsletter cron
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "SITE_URL and CRON_SECRET secrets are required."
            exit 1
          fi
          curl -fsS -X POST "${SITE_URL%/}/api/cron/newsletter" \
            -H "Authorization: Bearer ${CRON_SECRET}"
