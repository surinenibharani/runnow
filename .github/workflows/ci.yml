name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate internal content links
        run: npm run validate:links

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?sslmode=disable"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci?sslmode=disable"
          AUTH_SECRET: "ci-auth-secret-minimum-32-characters-long"
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
